<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards · Fiches 101</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%23F2EFE9'/%3E%3Crect x='1' y='1' width='62' height='62' rx='15' fill='none' stroke='%23DDD9CF' stroke-width='1.5'/%3E%3Ctext x='32' y='43' font-family='Georgia,serif' font-size='30' font-weight='700' fill='%231C1B19' text-anchor='middle'%3EF%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F2EFE9; --card:#FFFFFF; --ink:#1C1B19; --ink-soft:#52504B; --ink-faint:#8A877F;
    --line:#EAE7DF; --line-strong:#DDD9CF;
    --gray:#7A766E; --gray-bg:#EFEDE6;
    --radius:16px; --shadow:0 1px 4px rgba(0,0,0,.05),0 0 0 1px rgba(0,0,0,.04);
  }
  [data-theme="dark"]{
    --bg:#15140F; --card:#201F1A; --ink:#ECEAE3; --ink-soft:#B7B4AB; --ink-faint:#827F77;
    --line:#322F28; --line-strong:#403D34;
    --gray:#9A968D; --gray-bg:#2B2A24;
    --shadow:0 1px 2px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{background:var(--bg);color:var(--ink);
    font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.55;-webkit-font-smoothing:antialiased;font-size:15px;transition:background .25s,color .25s;
    min-height:100vh;}

  .hero{max-width:1040px;margin:0 auto;padding:30px 24px 8px;
    display:flex;align-items:center;justify-content:space-between;gap:16px;}
  .hero-left{display:flex;align-items:center;gap:14px;}
  .back{color:var(--ink-soft);text-decoration:none;font-size:14px;font-weight:600;display:flex;align-items:center;gap:5px;transition:.15s;}
  .back:hover{color:var(--ink);}
  .hero-title{font-family:"Playfair Display",serif;font-size:28px;font-weight:700;}
  .theme-toggle{border:1px solid var(--line);background:var(--card);color:var(--ink-soft);width:38px;height:38px;
    border-radius:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;
    box-shadow:var(--shadow);transition:.15s;}
  .theme-toggle:hover{border-color:var(--line-strong);}

  /* ---------- ÉCRAN DE CHOIX ---------- */
  .picker{max-width:1040px;margin:0 auto;padding:18px 24px 70px;}
  .picker-sec{margin-bottom:26px;}
  .picker-lbl{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-faint);margin-bottom:12px;}
  .scope-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;}
  .scope-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;cursor:pointer;
    box-shadow:var(--shadow);transition:all .18s;text-align:left;}
  .scope-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.1),0 0 0 1px rgba(0,0,0,.04);}
  .scope-card .n{font-family:"Playfair Display",serif;font-weight:700;font-size:22px;color:var(--ink);}
  .scope-card .t{font-weight:700;font-size:14px;margin-top:4px;}
  .scope-card .c{font-size:11.5px;color:var(--ink-faint);margin-top:3px;}
  .scope-all{background:var(--ink);color:var(--bg);}
  .scope-all .n,.scope-all .t{color:var(--bg);}
  .scope-all .c{color:var(--bg);opacity:.65;}
  .empty{text-align:center;color:var(--ink-faint);padding:70px 20px;font-size:14px;}

  /* ---------- SESSION ---------- */
  .session{display:none;max-width:640px;margin:0 auto;padding:18px 24px 70px;}
  .session.on{display:block;}
  .picker.hidden{display:none;}
  .sess-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:10px;flex-wrap:wrap;}
  .sess-exit{color:var(--ink-soft);text-decoration:none;font-size:13.5px;font-weight:600;cursor:pointer;}
  .sess-exit:hover{color:var(--ink);}
  .sess-pos{font-size:12.5px;color:var(--ink-faint);}
  .fc{background:var(--card);border-radius:18px;box-shadow:var(--shadow);min-height:230px;display:flex;
    align-items:center;justify-content:center;padding:30px;cursor:pointer;perspective:1200px;position:relative;}
  .fc-inner{position:relative;width:100%;height:100%;min-height:170px;transform-style:preserve-3d;transition:transform .35s;}
  .fc.flip .fc-inner{transform:rotateY(180deg);}
  .fc-front,.fc-back{position:absolute;inset:0;backface-visibility:hidden;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:10px;border-radius:14px;gap:10px;}
  .fc-front{background:var(--gray-bg);}
  .fc-back{background:color-mix(in srgb,var(--gray) 16%,var(--card));transform:rotateY(180deg);}
  .fc-text{font-size:17px;font-weight:600;color:var(--ink);line-height:1.5;}
  .fc-src{font-size:11px;color:var(--ink-faint);font-weight:600;}
  .sess-ctrl{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:18px;}
  .sess-ctrl button{border:1px solid var(--line);background:var(--card);color:var(--ink-soft);width:40px;height:40px;
    border-radius:50%;cursor:pointer;font-size:15px;box-shadow:var(--shadow);transition:.15s;}
  .sess-ctrl button:hover{border-color:var(--line-strong);color:var(--ink);}
  .hint{text-align:center;font-size:12px;color:var(--ink-faint);margin-top:14px;}

  footer{text-align:center;padding:6px 20px 40px;color:#C5BFB6;font-size:15px;font-family:"Playfair Display",serif;font-style:italic;}
  [data-theme="dark"] footer{color:#5A564D;}

  @media(max-width:700px){
    .hero{flex-direction:column;align-items:flex-start;gap:10px;}
    .hero-title{font-size:23px;}
  }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-left">
    <a href="index.html" class="back">← Index</a>
    <div class="hero-title">Flashcards</div>
  </div>
  <button class="theme-toggle" id="themeBtn" title="Mode sombre">🌙</button>
</div>

<div class="picker" id="picker">
  <div class="picker-sec">
    <div class="picker-lbl">Tout réviser</div>
    <div class="scope-grid" id="allScope"></div>
  </div>
  <div class="picker-sec">
    <div class="picker-lbl">Par spécialité</div>
    <div class="scope-grid" id="specScope"></div>
  </div>
  <div class="picker-sec">
    <div class="picker-lbl">Par item</div>
    <div class="scope-grid" id="itemScope"></div>
  </div>
</div>

<div class="session" id="session">
  <div class="sess-top">
    <span class="sess-exit" id="sessExit">← Choisir un autre périmètre</span>
    <span class="sess-pos" id="sessPos"></span>
  </div>
  <div class="fc" id="fc">
    <div class="fc-inner">
      <div class="fc-front"><div class="fc-text" id="fcFront"></div><div class="fc-src" id="fcSrcFront"></div></div>
      <div class="fc-back"><div class="fc-text" id="fcBack"></div><div class="fc-src" id="fcSrcBack"></div></div>
    </div>
  </div>
  <div class="sess-ctrl">
    <button id="fcPrev" title="Précédente">‹</button>
    <button id="fcShuffle" title="Mélanger">🔀</button>
    <button id="fcNext" title="Suivante">›</button>
  </div>
  <div class="hint">Clique sur la carte pour voir la réponse, puis encore pour passer à la suivante.</div>
</div>

<footer></footer>

<script>
  /* ============================================================
     RÉFÉRENCE DES FICHES — tenue à jour par Claude en cohérence avec index.html
     ============================================================ */
  const FICHES = [
    {file:"item-45-specificites-maladies-genetiques.html", num:45, title:"Spécificités des maladies génétiques", specs:["Génétique médicale","Pédiatrie"]},
  ];
  const FICHE_BY_NUM={};FICHES.forEach(f=>FICHE_BY_NUM[f.num]=f);

  const themeBtn=document.getElementById('themeBtn');
  function applyTheme(t){document.documentElement.setAttribute('data-theme',t);themeBtn.textContent=t==='dark'?'☀️':'🌙';}
  let theme='light';
  try{theme=localStorage.getItem('edn-index-theme')||'light';}catch(e){}
  applyTheme(theme);
  themeBtn.onclick=()=>{theme=theme==='dark'?'light':'dark';applyTheme(theme);try{localStorage.setItem('edn-index-theme',theme);}catch(e){}};

  function loadGlobalCards(){try{return JSON.parse(localStorage.getItem('flashcards-global'))||{};}catch(e){return {};}}
  const GLOBAL=loadGlobalCards(); // { itemNum: {itemTitle, specs, cards:[{front,back}]} }

  function flatten(filterFn){
    const out=[];
    Object.keys(GLOBAL).forEach(numStr=>{
      const num=parseInt(numStr,10);
      const entry=GLOBAL[numStr];
      if(!filterFn(num,entry))return;
      (entry.cards||[]).forEach(c=>out.push({front:c.front,back:c.back,itemNum:num,itemTitle:entry.itemTitle}));
    });
    return out;
  }
  function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}

  /* ---------- ÉCRAN DE CHOIX ---------- */
  const allScope=document.getElementById('allScope'),specScope=document.getElementById('specScope'),itemScope=document.getElementById('itemScope');
  const totalCards=flatten(()=>true).length;
  const itemNums=Object.keys(GLOBAL).map(n=>parseInt(n,10)).sort((a,b)=>a-b);
  const allSpecs=[...new Set(itemNums.flatMap(n=>GLOBAL[n].specs||[]))].sort();

  if(!totalCards){
    document.getElementById('picker').innerHTML='<div class="empty">Aucune flashcard pour l\'instant. Ajoute-en depuis tes fiches, elles apparaîtront ici automatiquement.</div>';
  }else{
    const allCard=document.createElement('button');allCard.className='scope-card scope-all';
    allCard.innerHTML=`<div class="n">${totalCards}</div><div class="t">Toutes les flashcards</div><div class="c">${itemNums.length} item${itemNums.length>1?'s':''}</div>`;
    allCard.onclick=()=>startSession(flatten(()=>true),"Toutes les flashcards");
    allScope.appendChild(allCard);

    allSpecs.forEach(spec=>{
      const cards=flatten((num,entry)=>(entry.specs||[]).includes(spec));
      const c=document.createElement('button');c.className='scope-card';
      c.innerHTML=`<div class="n">${cards.length}</div><div class="t">${spec}</div><div class="c">${cards.length} carte${cards.length>1?'s':''}</div>`;
      c.onclick=()=>startSession(flatten((num,entry)=>(entry.specs||[]).includes(spec)),spec);
      specScope.appendChild(c);
    });

    itemNums.forEach(num=>{
      const entry=GLOBAL[num];
      const cards=entry.cards||[];
      const c=document.createElement('button');c.className='scope-card';
      c.innerHTML=`<div class="n">${cards.length}</div><div class="t">Item ${num}</div><div class="c">${entry.itemTitle||''}</div>`;
      c.onclick=()=>startSession(flatten(n=>n===num),'Item '+num);
      itemScope.appendChild(c);
    });
  }

  /* ---------- SESSION ---------- */
  const picker=document.getElementById('picker'),session=document.getElementById('session');
  const fcEl=document.getElementById('fc'),fcFront=document.getElementById('fcFront'),fcBack=document.getElementById('fcBack');
  const fcSrcFront=document.getElementById('fcSrcFront'),fcSrcBack=document.getElementById('fcSrcBack');
  const sessPos=document.getElementById('sessPos'),sessExit=document.getElementById('sessExit');
  let sessCards=[],sessIdx=0;

  function startSession(cards,label){
    if(!cards.length)return;
    sessCards=shuffle(cards.slice());sessIdx=0;
    picker.classList.add('hidden');session.classList.add('on');
    renderSessCard();
  }
  function exitSession(){session.classList.remove('on');picker.classList.remove('hidden');}
  sessExit.onclick=exitSession;

  function renderSessCard(){
    const c=sessCards[sessIdx];
    fcEl.classList.remove('flip');
    fcFront.textContent=c.front;fcBack.textContent=c.back;
    const src='Item '+c.itemNum+(c.itemTitle?' · '+c.itemTitle:'');
    fcSrcFront.textContent=src;fcSrcBack.textContent=src;
    sessPos.textContent=(sessIdx+1)+' / '+sessCards.length;
  }
  fcEl.onclick=()=>{
    if(fcEl.classList.contains('flip')){sessIdx=(sessIdx+1)%sessCards.length;renderSessCard();}
    else{fcEl.classList.add('flip');}
  };
  document.getElementById('fcNext').onclick=()=>{sessIdx=(sessIdx+1)%sessCards.length;renderSessCard();};
  document.getElementById('fcPrev').onclick=()=>{sessIdx=(sessIdx-1+sessCards.length)%sessCards.length;renderSessCard();};
  document.getElementById('fcShuffle').onclick=()=>{shuffle(sessCards);sessIdx=0;renderSessCard();};
</script>
</body>
</html>
