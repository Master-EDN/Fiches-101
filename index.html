<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiches 101</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%23F2EFE9'/%3E%3Crect x='1' y='1' width='62' height='62' rx='15' fill='none' stroke='%23DDD9CF' stroke-width='1.5'/%3E%3Ctext x='32' y='43' font-family='Georgia,serif' font-size='30' font-weight='700' fill='%231C1B19' text-anchor='middle'%3EF%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F2EFE9; --card:#FFFFFF; --ink:#1C1B19; --ink-soft:#52504B; --ink-faint:#8A877F;
    --line:#EAE7DF; --line-strong:#DDD9CF;
    --gray:#7A766E; --gray-bg:#EFEDE6;
    --radius:16px; --shadow:0 1px 4px rgba(0,0,0,.05),0 0 0 1px rgba(0,0,0,.04);
  }
  [data-theme="dark"]{
    --bg:#15140F; --card:#201F1A; --ink:#ECEAE3; --ink-soft:#B7B4AB; --ink-faint:#827F77;
    --line:#322F28; --line-strong:#403D34;
    --gray:#9A968D; --gray-bg:#2B2A24;
    --shadow:0 1px 2px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{background:var(--bg);color:var(--ink);
    font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.55;-webkit-font-smoothing:antialiased;font-size:15px;transition:background .25s,color .25s;
    min-height:100vh;}

  /* ---------- HERO ---------- */
  .hero{max-width:1040px;margin:0 auto;padding:30px 24px 8px;
    display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:20px;}
  .hero-left,.hero-right{display:flex;}
  .hero-left{justify-content:flex-start;}
  .hero-right{justify-content:flex-end;align-items:center;gap:10px;}
  .clock-box,.countdown-box{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:10px 18px;display:inline-block;box-shadow:0 1px 4px rgba(0,0,0,.04);}
  .clock-box{text-align:left;}
  .countdown-box{text-align:right;}
  .clock-time{font-size:22px;font-weight:700;color:var(--ink);line-height:1;font-family:"Playfair Display",serif;}
  .clock-date{font-size:9px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:1.5px;margin-top:4px;}
  .countdown-num{font-size:30px;font-weight:700;color:var(--ink);line-height:1;font-family:"Playfair Display",serif;}
  .countdown-lbl{font-size:9px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:2px;margin-top:3px;}
  .hero-center{text-align:center;}
  .hero-eyebrow{font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--ink-faint);margin-bottom:8px;}
  .hero-name{font-family:"Playfair Display",serif;font-size:32px;font-weight:700;color:var(--ink);line-height:1;}
  .hero-sub{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--ink-faint);margin-top:8px;}
  .theme-toggle{border:1px solid var(--line);background:var(--card);color:var(--ink-soft);width:38px;height:38px;
    border-radius:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;
    box-shadow:var(--shadow);transition:.15s;}
  .theme-toggle:hover{border-color:var(--line-strong);}

  /* ---------- SEARCH / FILTER BAR ---------- */
  .controlbar{max-width:1040px;margin:0 auto;padding:22px 24px 0;display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .search{flex:1;min-width:220px;display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);
    border-radius:12px;padding:10px 14px;box-shadow:var(--shadow);}
  .search input{border:none;outline:none;background:transparent;font-size:14px;color:var(--ink);width:100%;font-family:inherit;}
  .search input::placeholder{color:var(--ink-faint);}
  .chips{display:flex;gap:7px;flex-wrap:wrap;}
  .chip{border:1px solid var(--line);background:var(--card);color:var(--ink-soft);font-size:12.5px;font-weight:600;
    padding:7px 13px;border-radius:999px;cursor:pointer;white-space:nowrap;transition:.15s;}
  .chip:hover{border-color:var(--line-strong);}
  .chip.active{background:var(--ink);color:var(--bg);border-color:var(--ink);}

  /* ---------- LIST ---------- */
  .list{max-width:1040px;margin:0 auto;padding:18px 24px 70px;display:flex;flex-direction:column;gap:10px;}
  .row{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
    padding:14px 20px;display:flex;align-items:center;gap:16px;text-decoration:none;color:inherit;
    transition:all .18s;position:relative;}
  .row:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.1),0 0 0 1px rgba(0,0,0,.04);}
  .num{flex:0 0 auto;width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;
    font-family:Inter,sans-serif;font-weight:600;font-size:14px;background:var(--gray-bg);color:var(--ink-soft);line-height:1;}
  .meta{flex:1;min-width:0;}
  .meta .ttl{font-weight:700;font-size:16px;margin-bottom:3px;font-family:"Playfair Display",serif;}
  .meta .sub{font-size:11.5px;color:var(--ink-faint);display:flex;gap:7px;align-items:center;flex-wrap:wrap;}
  .tag{display:inline-flex;align-items:center;padding:3px 9px;border-radius:999px;font-size:10.5px;font-weight:600;
    background:var(--gray-bg);color:var(--ink-soft);}
  .arrow{flex:0 0 auto;color:var(--line-strong);font-size:18px;font-weight:300;transition:.18s;}
  .row:hover .arrow{color:var(--ink-faint);transform:translateX(3px);}
  .empty{text-align:center;color:var(--ink-faint);padding:60px 20px;font-size:14px;}

  footer{text-align:center;padding:6px 20px 40px;color:#C5BFB6;font-size:15px;font-family:"Playfair Display",serif;font-style:italic;}
  [data-theme="dark"] footer{color:#5A564D;}

  @media(max-width:700px){
    .hero{grid-template-columns:1fr;text-align:center;gap:12px;}
    .hero-left{order:2;justify-content:center;}
    .hero-right{order:3;justify-content:center;}
    .hero-name{font-size:27px;}
    .row{padding:12px 14px;gap:12px;}
    .num{width:38px;height:38px;font-size:13px;}
  }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-left">
    <div class="clock-box">
      <div class="clock-time" id="clockTime"></div>
      <div class="clock-date" id="clockDate"></div>
    </div>
  </div>
  <div class="hero-center">
    <div class="hero-eyebrow">Révisions</div>
    <div class="hero-name">Fiches 101</div>
    <div class="hero-sub">Rhumatologie - Paris</div>
  </div>
  <div class="hero-right">
    <div class="countdown-box">
      <div class="countdown-num" id="cntDays"></div>
      <div class="countdown-lbl">jours avant l'EDN</div>
    </div>
  </div>
</div>

<div class="controlbar">
  <div class="search">🔍 <input id="searchInput" placeholder="Rechercher un item, un titre, une spécialité…" autocomplete="off"></div>
  <a href="flashcards.html" class="theme-toggle" id="flashcardsBtn" title="Flashcards globales" style="text-decoration:none;font-size:16px;">🗂️</a>
  <a href="carnet.html" class="theme-toggle" id="carnetBtn" title="Carnet d'erreur global" style="text-decoration:none;font-size:16px;">📓</a>
  <button class="theme-toggle" id="themeBtn" title="Mode sombre">🌙</button>
</div>
<div class="controlbar" style="padding-top:10px;">
  <div class="chips" id="chips"></div>
</div>

<div class="list" id="list"></div>

<footer>"you want smiles on results day."</footer>

<script>
/* ============================================================
   AJOUTE TES FICHES ICI
   - file : nom EXACT du fichier .html sur GitHub — toujours en minuscules,
            sans accents ni espaces (ex: item-46-nom-de-litem.html)
   - num  : numéro de l'item EDN
   - title: titre de l'item (peut garder accents/majuscules, c'est l'affichage)
   - specs: tableau des spécialités concernées
   ============================================================ */
  const FICHES = [
    {file:"item-45-specificites-maladies-genetiques.html", num:45, title:"Spécificités des maladies génétiques", specs:["Génétique médicale","Pédiatrie"]},
  ];

/* ============================================================ */

  const themeBtn=document.getElementById('themeBtn');
  function applyTheme(t){document.documentElement.setAttribute('data-theme',t);themeBtn.textContent=t==='dark'?'☀️':'🌙';}
  let theme='light';
  try{theme=localStorage.getItem('edn-index-theme')||'light';}catch(e){}
  applyTheme(theme);
  themeBtn.onclick=()=>{theme=theme==='dark'?'light':'dark';applyTheme(theme);try{localStorage.setItem('edn-index-theme',theme);}catch(e){}};

  /* Horloge */
  const jours=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const mois=['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
  function updateClock(){
    const now=new Date();
    const hh=String(now.getHours()).padStart(2,'0');
    const mm=String(now.getMinutes()).padStart(2,'0');
    document.getElementById('clockTime').textContent=hh+':'+mm;
    document.getElementById('clockDate').textContent=jours[now.getDay()]+' '+now.getDate()+' '+mois[now.getMonth()];
  }
  updateClock();setInterval(updateClock,1000);

  /* Compte à rebours avant l'EDN */
  const days=Math.ceil((new Date('2026-10-12T08:00:00')-new Date())/(1000*60*60*24));
  document.getElementById('cntDays').textContent=days;

  /* Liste des fiches */
  const list=document.getElementById('list');
  const chipsEl=document.getElementById('chips');
  const searchInput=document.getElementById('searchInput');

  const allSpecs=[...new Set(FICHES.flatMap(f=>f.specs))].sort();
  let activeSpec=null;

  function renderChips(){
    chipsEl.innerHTML='';
    const all=document.createElement('button');all.className='chip'+(activeSpec===null?' active':'');all.textContent='Toutes';
    all.onclick=()=>{activeSpec=null;renderChips();renderList();};
    chipsEl.appendChild(all);
    allSpecs.forEach(s=>{
      const c=document.createElement('button');c.className='chip'+(activeSpec===s?' active':'');c.textContent=s;
      c.onclick=()=>{activeSpec=activeSpec===s?null:s;renderChips();renderList();};
      chipsEl.appendChild(c);
    });
  }

  function renderList(){
    const q=searchInput.value.trim().toLowerCase();
    const filtered=FICHES.filter(f=>{
      if(activeSpec&&!f.specs.includes(activeSpec))return false;
      if(!q)return true;
      const hay=(f.num+" "+f.title+" "+f.specs.join(" ")).toLowerCase();
      return hay.includes(q);
    }).sort((a,b)=>a.num-b.num);

    list.innerHTML='';
    if(!filtered.length){
      list.innerHTML='<div class="empty">Aucune fiche ne correspond à ta recherche.</div>';
      return;
    }
    filtered.forEach(f=>{
      const a=document.createElement('a');
      a.className='row';a.href=encodeURI(f.file);
      a.innerHTML=`
        <div class="num">${f.num}</div>
        <div class="meta">
          <div class="ttl">${f.title}</div>
          <div class="sub">Item ${f.num} ${f.specs.map(s=>`<span class="tag">${s}</span>`).join('')}</div>
        </div>
        <div class="arrow">›</div>`;
      list.appendChild(a);
    });
  }

  searchInput.addEventListener('input',renderList);
  renderChips();renderList();
</script>
</body>
</html>
