<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EDN 2026 · Fiches 101</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FAFAF7; --card:#FFFFFF; --ink:#1C1B19; --ink-soft:#52504B; --ink-faint:#8A877F;
    --line:#EAE7DF; --line-strong:#DDD9CF;
    --cg:#5B5BD6; --cg-bg:#EEEEFB; --t21:#C77A12; --t21-bg:#FBF1DF;
    --muco:#0E8C8C; --muco-bg:#E1F3F2; --xf:#9333A8; --xf-bg:#F4E9F7;
    --warn:#C0392B; --warn-bg:#FBE9E7;
    --gray:#7A766E; --gray-bg:#EFEDE6; --btn-bg:#5F5C55; --btn-fg:#FFFFFF;
    --radius:16px; --shadow:0 1px 2px rgba(30,28,24,.04), 0 8px 24px rgba(30,28,24,.05);
  }
  [data-theme="dark"]{
    --bg:#15140F; --card:#201F1A; --ink:#ECEAE3; --ink-soft:#B7B4AB; --ink-faint:#827F77;
    --line:#322F28; --line-strong:#403D34;
    --cg:#9D9DF2; --cg-bg:#26264A; --t21:#E2A748; --t21-bg:#3A2E16;
    --muco:#4FC4C0; --muco-bg:#11332F; --xf:#CB7FDD; --xf-bg:#341A3C;
    --warn:#F08C7E; --warn-bg:#3A1E18;
    --gray:#9A968D; --gray-bg:#2B2A24; --btn-bg:#54514A; --btn-fg:#F2F0EA;
    --shadow:0 1px 2px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.55;-webkit-font-smoothing:antialiased;font-size:15px;transition:background .25s,color .25s;}

  /* ---------- TOPBAR ---------- */
  .topbar{position:sticky;top:0;z-index:50;background:color-mix(in srgb,var(--bg) 82%,transparent);
    backdrop-filter:saturate(180%) blur(18px);border-bottom:1px solid var(--line);}
  .topbar-inner{max-width:980px;margin:0 auto;padding:14px 22px;display:flex;align-items:center;justify-content:space-between;gap:14px;}
  .brand{font-family:"Playfair Display",serif;font-weight:700;font-size:18px;letter-spacing:.01em;}
  .brand span{color:var(--ink-faint);font-family:Inter,sans-serif;font-weight:500;font-size:13px;margin-left:8px;}
  .tools{display:flex;align-items:center;gap:8px;}
  .tool{border:1px solid var(--line);background:var(--card);color:var(--ink-soft);font-size:13px;font-weight:600;
    padding:8px 13px;border-radius:10px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:.15s;}
  .tool:hover{border-color:var(--line-strong);color:var(--ink);}

  /* ---------- HERO ---------- */
  .hero{max-width:980px;margin:0 auto;padding:54px 22px 18px;}
  .kicker{font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);}
  h1{font-family:"Playfair Display",serif;font-weight:700;font-size:38px;line-height:1.15;margin:10px 0 12px;letter-spacing:-.01em;}
  .lead{color:var(--ink-soft);font-size:15.5px;max-width:620px;}

  /* ---------- SEARCH / FILTER BAR ---------- */
  .controlbar{max-width:980px;margin:0 auto;padding:6px 22px 0;display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .search{flex:1;min-width:220px;display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);
    border-radius:12px;padding:10px 14px;box-shadow:var(--shadow);}
  .search input{border:none;outline:none;background:transparent;font-size:14px;color:var(--ink);width:100%;font-family:inherit;}
  .search input::placeholder{color:var(--ink-faint);}
  .chips{display:flex;gap:7px;flex-wrap:wrap;}
  .chip{border:1px solid var(--line);background:var(--card);color:var(--ink-soft);font-size:12.5px;font-weight:600;
    padding:7px 13px;border-radius:999px;cursor:pointer;white-space:nowrap;transition:.15s;}
  .chip:hover{border-color:var(--line-strong);}
  .chip.active{background:var(--ink);color:var(--bg);border-color:var(--ink);}

  /* ---------- LIST ---------- */
  .list{max-width:980px;margin:0 auto;padding:22px 22px 80px;display:flex;flex-direction:column;gap:12px;}
  .row{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);
    padding:18px 20px;display:flex;align-items:center;gap:16px;text-decoration:none;color:inherit;transition:.15s;position:relative;}
  .row:hover{border-color:var(--line-strong);transform:translateY(-1px);}
  .num{flex:0 0 auto;width:52px;height:52px;border-radius:13px;display:flex;align-items:center;justify-content:center;
    font-family:"Playfair Display",serif;font-weight:700;font-size:16px;color:#fff;}
  .meta{flex:1;min-width:0;}
  .meta .ttl{font-weight:700;font-size:15.5px;margin-bottom:4px;}
  .meta .sub{font-size:12.5px;color:var(--ink-faint);display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .tag{display:inline-flex;align-items:center;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:700;}
  .arrow{flex:0 0 auto;color:var(--ink-faint);font-size:18px;transition:.15s;}
  .row:hover .arrow{transform:translateX(3px);color:var(--ink);}
  .empty{text-align:center;color:var(--ink-faint);padding:60px 20px;font-size:14px;}

  .c1,.c2,.c3,.c4,.c5,.c6{background:var(--ink);}
  .c1tag,.c2tag,.c3tag,.c4tag,.c5tag,.c6tag{background:var(--line);color:var(--ink-soft);}

  footer{text-align:center;padding:30px 20px 50px;color:var(--ink-faint);font-size:12.5px;}

  @media(max-width:600px){
    h1{font-size:29px;}
    .topbar-inner{padding:12px 16px;}
    .row{padding:14px 14px;gap:12px;}
    .num{width:44px;height:44px;font-size:14px;}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="brand">EDN 2026</div>
    <div class="tools">
      <div class="tool" id="themeBtn">🌙</div>
    </div>
  </div>
</div>

<div class="hero">
  <div class="kicker">Révisions EDN</div>
  <h1>Fiches 101</h1>
</div>

<div class="controlbar">
  <div class="search">🔍 <input id="searchInput" placeholder="Rechercher un item, un titre, une spécialité…" autocomplete="off"></div>
</div>
<div class="controlbar" style="padding-top:10px;">
  <div class="chips" id="chips"></div>
</div>

<div class="list" id="list"></div>

<footer><i>to help those who cannot help themselves</i></footer>

<script>
/* ============================================================
   AJOUTE TES FICHES ICI
   - file : nom EXACT du fichier .html sur GitHub — toujours en minuscules,
            sans accents ni espaces (ex: item-46-nom-de-litem.html)
   - num  : numéro de l'item EDN
   - title: titre de l'item (peut garder accents/majuscules, c'est l'affichage)
   - specs: tableau des spécialités concernées
   ============================================================ */
  const FICHES = [
    {file:"item-45-specificites-maladies-genetiques.html", num:45, title:"Spécificités des maladies génétiques", specs:["Génétique médicale","Pédiatrie"]},
  ];

/* ============================================================ */

  const body=document.body;
  const themeBtn=document.getElementById('themeBtn');
  function applyTheme(t){document.documentElement.setAttribute('data-theme',t);themeBtn.textContent=t==='dark'?'☀️':'🌙';}
  let theme='light';
  try{theme=localStorage.getItem('edn-index-theme')||'light';}catch(e){}
  applyTheme(theme);
  themeBtn.onclick=()=>{theme=theme==='dark'?'light':'dark';applyTheme(theme);try{localStorage.setItem('edn-index-theme',theme);}catch(e){}};

  const list=document.getElementById('list');
  const chipsEl=document.getElementById('chips');
  const searchInput=document.getElementById('searchInput');

  const allSpecs=[...new Set(FICHES.flatMap(f=>f.specs))].sort();
  let activeSpec=null;

  function renderChips(){
    chipsEl.innerHTML='';
    const all=document.createElement('button');all.className='chip'+(activeSpec===null?' active':'');all.textContent='Toutes';
    all.onclick=()=>{activeSpec=null;renderChips();renderList();};
    chipsEl.appendChild(all);
    allSpecs.forEach(s=>{
      const c=document.createElement('button');c.className='chip'+(activeSpec===s?' active':'');c.textContent=s;
      c.onclick=()=>{activeSpec=activeSpec===s?null:s;renderChips();renderList();};
      chipsEl.appendChild(c);
    });
  }

  function renderList(){
    const q=searchInput.value.trim().toLowerCase();
    const filtered=FICHES.filter(f=>{
      if(activeSpec&&!f.specs.includes(activeSpec))return false;
      if(!q)return true;
      const hay=(f.num+" "+f.title+" "+f.specs.join(" ")).toLowerCase();
      return hay.includes(q);
    }).sort((a,b)=>a.num-b.num);

    list.innerHTML='';
    if(!filtered.length){
      list.innerHTML='<div class="empty">Aucune fiche ne correspond à ta recherche.</div>';
      return;
    }
    filtered.forEach(f=>{
      const a=document.createElement('a');
      a.className='row';a.href=encodeURI(f.file);
      a.innerHTML=`
        <div class="num c1">${f.num}</div>
        <div class="meta">
          <div class="ttl">${f.title}</div>
          <div class="sub">Item ${f.num} ${f.specs.map(s=>`<span class="tag c1tag">${s}</span>`).join('')}</div>
        </div>
        <div class="arrow">→</div>`;
      list.appendChild(a);
    });
  }

  searchInput.addEventListener('input',renderList);
  renderChips();renderList();
</script>
</body>
</html>
